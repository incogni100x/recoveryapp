<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Case Verification - PythonCyberHacks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      body {
        background: #121212;
        color: #fff;
        font-family: "Inter", sans-serif;
      }
      .panel {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(160, 160, 160, 0.2);
        border-radius: 16px;
      }
      .field {
        width: 100%;
        border-radius: 10px;
        border: 1px solid rgba(160, 160, 160, 0.35);
        background: rgba(255, 255, 255, 0.04);
        color: #fff;
        padding: 10px 12px;
      }
      .field:focus {
        outline: none;
        border-color: rgb(36, 90, 202);
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 9999px;
        background: rgb(36, 90, 202);
        color: #fff;
        padding: 10px 18px;
        font-weight: 600;
      }
      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.75;
      }
      .button-spinner {
        display: none;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: #fff;
        border-radius: 9999px;
        animation: button-spin 0.75s linear infinite;
      }
      .btn[data-loading="true"] .button-spinner {
        display: inline-block;
      }
      @keyframes button-spin {
        to {
          transform: rotate(360deg);
        }
      }
      .muted {
        color: rgb(160, 160, 160);
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .status svg {
        width: 16px;
        height: 16px;
      }
      .status.success {
        color: rgb(134, 239, 172);
      }
      .status.error {
        color: rgb(248, 113, 113);
      }
    </style>
  </head>
  <body class="min-h-screen">
    <main class="mx-auto max-w-3xl px-4 py-8">
      <h1 class="text-3xl font-medium">Case Verification</h1>
      <p class="muted mt-2">
        Enter your case ID to retrieve your submission and upload additional proof documents.
      </p>

      <section class="panel mt-6 p-5">
        <form id="lookupForm" class="flex gap-3 max-sm:flex-col">
          <input class="field" id="caseId" name="caseId" placeholder="Enter case ID (e.g. PCH-2026-AB12CD)" required />
          <button class="btn" type="submit" id="lookupSubmitButton">
            <span class="button-spinner" aria-hidden="true"></span>
            <span class="button-label">Retrieve Case</span>
          </button>
        </form>
        <p id="lookupStatus" class="muted mt-3"></p>
      </section>

      <section id="caseDetails" class="panel mt-5 hidden p-5">
        <h2 class="text-xl font-medium">Retrieved Case</h2>
        <pre id="caseSummary" class="mt-3 whitespace-pre-wrap text-sm text-white/85"></pre>

        <form id="proofForm" class="mt-5 space-y-3">
          <div>
            <label for="proofNotes" class="mb-2 block">Additional Proof Notes *</label>
            <textarea id="proofNotes" class="field min-h-[110px]" required></textarea>
          </div>
          <div>
            <label for="proofFiles" class="mb-2 block">Upload Files (max 3 files)</label>
            <input id="proofFiles" type="file" class="field" multiple accept=".pdf,.png,.jpg,.jpeg,.webp,.txt,.doc,.docx" />
          </div>
          <button class="btn" type="submit" id="proofSubmitButton">
            <span class="button-spinner" aria-hidden="true"></span>
            <span class="button-label">Submit Verification Proof</span>
          </button>
        </form>
        <p id="proofStatus" class="muted mt-3"></p>
      </section>
    </main>

    <script src="./js/supabase-config.js"></script>
    <script src="./js/verification.js"></script>
  </body>
</html>
